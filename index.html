<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safal Sapkota</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      font-family: 'Helvetica Neue', sans-serif;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }
    canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    #loader {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 1s ease;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    .pct {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 100;
      color: #fff;
      letter-spacing: -6px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .bar-wrap {
      width: 180px;
      height: 1px;
      background: #1a1a1a;
      margin-top: 2rem;
    }
    .bar-fill {
      height: 1px;
      width: 0%;
      background: #fff;
      transition: width 0.04s linear;
    }
    .load-txt {
      margin-top: 1rem;
      font-size: 10px;
      letter-spacing: 5px;
      color: #2a2a2a;
      text-transform: uppercase;
    }
    #main {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }
    #main.show { opacity: 1; pointer-events: all; }
    .name-wrap { overflow: hidden; line-height: 1; }
    .name {
      font-size: clamp(2.5rem, 8vw, 7rem);
      font-weight: 100;
      color: #fff;
      letter-spacing: -3px;
      transform: translateY(110%);
      transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1);
      display: inline-block;
    }
    .name.up { transform: translateY(0); }
    .glitch { position: relative; display: inline-block; }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .glitch::before {
      color: #ff003c;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      transform: translateX(-2px);
      animation: glitch1 3s infinite linear;
    }
    .glitch::after {
      color: #00f0ff;
      clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
      transform: translateX(2px);
      animation: glitch2 3s infinite linear;
    }
    .sub {
      font-size: 11px;
      letter-spacing: 6px;
      color: #333;
      text-transform: uppercase;
      margin-top: 1.5rem;
      opacity: 0;
      transition: opacity 0.8s ease 0.3s;
    }
    .sub.show { opacity: 1; }
    .langs {
      font-size: 10px;
      letter-spacing: 3px;
      color: #222;
      margin-top: 0.8rem;
      opacity: 0;
      transition: opacity 0.8s ease 0.6s;
    }
    .langs.show { opacity: 1; }
    .corner {
      position: absolute;
      font-size: 9px;
      letter-spacing: 2px;
      color: #1e1e1e;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1s ease 0.8s;
    }
    .corner.show { opacity: 1; }
    .tl { top: 2rem; left: 2.5rem; }
    .tr { top: 2rem; right: 2.5rem; }
    .bl { bottom: 2rem; left: 2.5rem; }
    .br { bottom: 2rem; right: 2.5rem; }
    @keyframes glitch1 {
      0%, 90%, 100% { transform: translateX(-2px); opacity: 0; }
      92% { transform: translateX(-4px); opacity: 1; }
      94% { transform: translateX(2px); opacity: 1; }
      96% { transform: translateX(-2px); opacity: 0; }
    }
    @keyframes glitch2 {
      0%, 90%, 100% { transform: translateX(2px); opacity: 0; }
      92% { transform: translateX(4px); opacity: 1; }
      94% { transform: translateX(-2px); opacity: 1; }
      96% { transform: translateX(2px); opacity: 0; }
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div id="loader">
    <div class="pct" id="pct">0</div>
    <div class="bar-wrap"><div class="bar-fill" id="bf"></div></div>
    <div class="load-txt">Initializing</div>
  </div>

  <div id="main">
    <div class="name-wrap">
      <div class="name glitch" id="nm" data-text="Safal Sapkota">Safal Sapkota</div>
    </div>
    <div class="sub" id="sub">Developer &nbsp;·&nbsp; Designer &nbsp;·&nbsp; Creator</div>
    <div class="langs" id="langs">EN · 日本語 · नेपाली · हिंदी</div>
  </div>

  <span class="corner tl" id="c1">digitalthakali.com</span>
  <span class="corner tr" id="c2">© 2026</span>
  <span class="corner bl" id="c3">Based in Japan</span>
  <span class="corner br" id="c4">Open to work</span>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const dots = Array.from({ length: 80 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.3,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      o: Math.random() * 0.4 + 0.05
    }));

    function drawDots() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      dots.forEach(d => {
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${d.o})`;
        ctx.fill();
        d.x += d.dx;
        d.y += d.dy;
        if (d.x < 0 || d.x > canvas.width) d.dx *= -1;
        if (d.y < 0 || d.y > canvas.height) d.dy *= -1;
      });
      requestAnimationFrame(drawDots);
    }
    drawDots();

    let cur = 0;
    const timer = setInterval(() => {
      cur += 1.8 + (Math.random() * 1.5);
      if (cur >= 100) {
        cur = 100;
        clearInterval(timer);
        setTimeout(reveal, 400);
      }
      document.getElementById('pct').textContent = Math.floor(cur);
      document.getElementById('bf').style.width = cur + '%';
    }, 40);

    function reveal() {
      document.getElementById('loader').classList.add('hide');
      setTimeout(() => {
        document.getElementById('main').classList.add('show');
        document.getElementById('nm').classList.add('up');
        setTimeout(() => document.getElementById('sub').classList.add('show'), 300);
        setTimeout(() => document.getElementById('langs').classList.add('show'), 600);
        ['c1','c2','c3','c4'].forEach(id => document.getElementById(id).classList.add('show'));
      }, 500);
    }
  </script>
</body>
</html>
